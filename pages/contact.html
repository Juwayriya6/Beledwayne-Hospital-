<div class="container hero"><div class="heading"><h1>Get in <span>touch</span> to support the project</h1></div><div class="contact-section"><div class="contact-box"><h3><i class="fas fa-map-marker-alt"></i> Location</h3><p>Hirshabelle, Somalia</p><h3><i class="fas fa-envelope"></i> Email</h3><p>hello@example.com</p><h3><i class="fas fa-link"></i> Fundraiser</h3><p>Replace with your LaunchGood, GoFundMe, PayPal, or Stripe donation link</p></div><div class="form-box"><form id="contactForm"><input type="text" id="name" placeholder="Your full name*" required><span class="error" id="nameError"></span><input type="email" id="email" placeholder="Your email address*" required><span class="error" id="emailError"></span><input type="text" id="subject" placeholder="Subject*" required><span class="error" id="subjectError"></span><textarea id="message" placeholder="Message*" required></textarea><span class="error" id="messageError"></span><button type="submit">Send message</button></form></div></div></div>
<script>
document.addEventListener("DOMContentLoaded", function () {
 const form=document.getElementById("contactForm");
 form.addEventListener("submit", function(e){e.preventDefault(); alert("This template form is front-end only. Connect it to Netlify Forms or your email service next.");});
});
</script>
